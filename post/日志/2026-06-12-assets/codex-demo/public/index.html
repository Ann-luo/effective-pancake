<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess the Number</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f172a;
    color: #f1f5f9;
  }
  .card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 40px;
    width: 380px;
    text-align: center;
  }
  h1 { font-size: 22px; margin-bottom: 8px; }
  .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 28px; }
  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  input {
    flex: 1;
    padding: 10px 14px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #0f172a;
    color: #f1f5f9;
    outline: none;
    text-align: center;
  }
  input:focus { border-color: #6366f1; }
  button {
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-guess {
    background: #6366f1;
    color: #fff;
    white-space: nowrap;
  }
  .btn-guess:hover { background: #4f46e5; }
  .btn-new {
    background: #334155;
    color: #cbd5e1;
    margin-top: 16px;
  }
  .btn-new:hover { background: #475569; }
  .feedback {
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 4px;
    padding: 8px;
    border-radius: 8px;
  }
  .feedback.higher { color: #fbbf24; }
  .feedback.lower { color: #f472b6; }
  .feedback.correct {
    color: #4ade80;
    background: rgba(74, 222, 128, 0.1);
  }
  .feedback.error { color: #f87171; }
  .attempts {
    color: #64748b;
    font-size: 13px;
    margin-bottom: 4px;
  }
</style>
</head>
<body>
<div class="card">
  <h1>Guess the Number</h1>
  <p class="subtitle">I'm thinking of a number from 1 to 100</p>
  <div class="input-row">
    <input type="number" id="guessInput" min="1" max="100" placeholder="Your guess...">
    <button class="btn-guess" id="guessBtn">Guess</button>
  </div>
  <p class="feedback" id="feedback"></p>
  <p class="attempts" id="attempts"></p>
  <button class="btn-new" id="newGameBtn">New Game</button>
</div>

<script>
const input = document.getElementById('guessInput');
const guessBtn = document.getElementById('guessBtn');
const newGameBtn = document.getElementById('newGameBtn');
const feedbackEl = document.getElementById('feedback');
const attemptsEl = document.getElementById('attempts');

async function sendGuess() {
  const guess = parseInt(input.value, 10);
  if (isNaN(guess) || guess < 1 || guess > 100) {
    feedbackEl.textContent = 'Please enter a number between 1 and 100';
    feedbackEl.className = 'feedback error';
    return;
  }

  const res = await fetch('/api/guess', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ guess }),
  });
  const data = await res.json();

  if (res.status === 400) {
    feedbackEl.textContent = data.error;
    feedbackEl.className = 'feedback error';
    return;
  }

  attemptsEl.textContent = `Attempts: ${data.attempts}`;

  if (data.result === 'higher') {
    feedbackEl.textContent = 'Higher!';
    feedbackEl.className = 'feedback higher';
  } else if (data.result === 'lower') {
    feedbackEl.textContent = 'Lower!';
    feedbackEl.className = 'feedback lower';
  } else {
    feedbackEl.textContent = `Correct! The number is ${data.target}. You got it in ${data.attempts} attempts.`;
    feedbackEl.className = 'feedback correct';
  }

  input.value = '';
  input.focus();
}

async function newGame() {
  await fetch('/api/new-game', { method: 'POST' });
  feedbackEl.textContent = '';
  feedbackEl.className = 'feedback';
  attemptsEl.textContent = '';
  input.value = '';
  input.focus();
}

guessBtn.addEventListener('click', sendGuess);
input.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendGuess(); });
newGameBtn.addEventListener('click', newGame);
</script>
</body>
</html>
