title: effective-pancake
description: 学习笔记 · 随性版 — 爱看看，不看滚，反正我写爽了就行
author: Ann-luo
theme: minima
baseurl: "/effective-pancake"
url: "https://ann-luo.github.io"

minima:
  date_format: "%Y年%m月%d日"
  social_links:
    - { platform: github, user_url: "https://github.com/Ann-luo" }

plugins:
  - jekyll-feed
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"

show_excerpts: true
